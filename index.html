<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f766e">
  <title>商品成本與毛利試算工具</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f4f7f6;color:#173333;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif}.header{background:#fff;border-bottom:1px solid #dfe7e5}.header-inner,.page{width:min(1080px,calc(100% - 32px));margin:auto}.header-inner{display:flex;align-items:center;gap:12px;padding:17px 0}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;background:#0f766e;color:#fff;font-weight:800}.header h1{margin:0;font-size:20px}.header p{margin:3px 0 0;color:#64748b;font-size:13px}.page{padding:28px 0}.layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(300px,.65fr);gap:22px;align-items:start}.card{background:#fff;border:1px solid #dfe7e5;border-radius:16px;box-shadow:0 12px 30px -24px #173333;overflow:hidden}.card-head{padding:18px 22px;border-bottom:1px solid #edf1f0}.card-head h2{margin:0;font-size:17px}.card-head p{margin:5px 0 0;color:#64748b;font-size:13px}.group{padding:21px 22px;border-bottom:1px solid #edf1f0}.group:last-child{border-bottom:0}.group-title{margin:0 0 14px;color:#0f766e;font-size:14px}.fields{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field label{display:block;margin-bottom:7px;color:#334155;font-size:13px;font-weight:700}.input-wrap{position:relative}.field input,.field select{width:100%;min-height:45px;padding:10px 82px 10px 12px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#0f172a;font-size:16px}.field select{padding-right:12px}.field input:focus,.field select:focus{outline:3px solid #ccfbf1;border-color:#0f766e}.unit{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:12px;font-weight:700}.hint{margin:6px 0 0;color:#64748b;font-size:12px;line-height:1.45}.group-result{display:flex;justify-content:space-between;gap:12px;margin-top:14px;padding:11px 13px;border-radius:10px;background:#f5f8f7;color:#64748b;font-size:12px}.group-result strong{color:#173333;font-size:14px}.summary{position:sticky;top:18px}.summary-top{padding:22px;background:#13413f;color:#fff}.summary-top>p{margin:0;color:#ccfbf1;font-size:13px}.top-values{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.top-values span{display:block;color:#ccfbf1;font-size:11px}.top-values strong{display:block;margin-top:4px;font-size:18px}.profit-box{margin:18px;padding:18px;border-radius:13px;background:#f1f5f4}.profit-box.positive{background:#ecfdf5}.profit-box.negative{background:#fef2f2}.profit-box span{color:#64748b;font-size:13px}.profit{display:block!important;margin-top:6px;color:#475569!important;font-size:30px!important;font-weight:850}.positive .profit,.positive .margin{color:#047857!important}.negative .profit,.negative .margin{color:#b91c1c!important}.margin-row{display:flex;align-items:end;justify-content:space-between;margin-top:15px;padding-top:14px;border-top:1px solid #dfe7e5}.margin{font-size:23px;font-weight:850}.cost-list{margin:0 18px 18px}.cost-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid #edf1f0;font-size:13px}.cost-row:last-child{border-bottom:0}.cost-row dt{color:#64748b}.cost-row dd{margin:0;font-weight:750}.actions{display:flex;gap:10px;margin-top:20px}.btn{min-height:43px;padding:9px 16px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#334155;font-weight:750;cursor:pointer}.btn:hover{background:#f8fafc}.btn.danger{margin-left:auto;border-color:#fecaca;color:#b91c1c}.footer{padding:20px;text-align:center;color:#94a3b8;font-size:12px}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);padding:11px 16px;border-radius:10px;background:#0f172a;color:#fff;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s}.toast.show{opacity:1}@media(max-width:780px){.layout{grid-template-columns:1fr}.summary{position:static}.fields{grid-template-columns:1fr}.header h1{font-size:17px}.page{padding-top:18px}.actions{flex-wrap:wrap}.btn.danger{margin-left:0}.group-result{flex-direction:column}.top-values strong{font-size:16px}}@media(max-width:390px){.header-inner,.page{width:min(100% - 20px,1080px)}.group,.card-head{padding-left:16px;padding-right:16px}.summary-top{padding:18px}.profit-box,.cost-list{margin-left:14px;margin-right:14px}}
  </style>
</head>
<body>
  <header class="header"><div class="header-inner"><div class="logo">算</div><div><h1>商品成本與毛利試算工具</h1><p>輸入資料後立即計算，內容自動保存在此瀏覽器</p></div></div></header>
  <main class="page">
    <div class="layout">
      <section class="card">
        <div class="card-head"><h2>輸入資料</h2><p>所有金額及比例修改後，右側結果會立即更新</p></div>
        <div class="group"><h3 class="group-title">1. 採購價格</h3><div class="fields">
          <div class="field"><label for="purchase">單件採購價格</label><div class="input-wrap"><input id="purchase" type="number" min="0" step="any"><span class="unit">CNY</span></div></div>
          <div class="field"><label for="rate">人民幣匯率</label><div class="input-wrap"><input id="rate" type="number" min="0.01" step="any"><span class="unit">TWD/CNY</span></div><p class="hint">1人民幣等於多少新台幣</p></div>
        </div><div class="group-result"><span>換算後台幣採購成本</span><strong id="purchase-result"></strong></div></div>
        <div class="group"><h3 class="group-title">2. 中國境內運費</h3><div class="fields">
          <div class="field"><label for="china-rate">境內運費比例</label><div class="input-wrap"><input id="china-rate" type="number" min="0" max="100" step="any"><span class="unit">%</span></div><p class="hint">預設為人民幣採購價格的6%</p></div>
        </div><div class="group-result"><span id="china-rmb"></span><strong id="china-result"></strong></div></div>
        <div class="group"><h3 class="group-title">3. 海運運費</h3><div class="fields">
          <div class="field"><label for="shipping">海運方式</label><select id="shipping"><option value="0.036">海快普｜每公克 NT$0.036</option><option value="0.047">海快特｜每公克 NT$0.047</option><option value="0.022">海運｜每公克 NT$0.022</option></select></div>
          <div class="field"><label for="weight">商品含包裝重量</label><div class="input-wrap"><input id="weight" type="number" min="0" step="any"><span class="unit">公克</span></div></div>
        </div><div class="group-result"><span id="shipping-detail"></span><strong id="shipping-result"></strong></div></div>
        <div class="group"><h3 class="group-title">4. 售價與平台費用</h3><div class="fields">
          <div class="field"><label for="sale">售價（台幣完稅價格）</label><div class="input-wrap"><input id="sale" type="number" min="0" step="any"><span class="unit">TWD</span></div></div>
          <div class="field"><label for="platform-rate">平台抽成比例</label><div class="input-wrap"><input id="platform-rate" type="number" min="0" max="100" step="any"><span class="unit">%</span></div><p class="hint">預設14.5%；營業稅＝售價÷1.05×5%</p></div>
        </div><div class="group-result"><span id="sale-detail"></span><strong id="sale-result"></strong></div></div>
      </section>
      <aside class="card summary">
        <div class="summary-top"><p>試算結果</p><div class="top-values"><div><span>商品售價</span><strong id="sale-summary"></strong></div><div><span>單件總成本</span><strong id="total"></strong></div></div></div>
        <div class="profit-box" id="profit-box"><span>單件毛利</span><strong class="profit" id="profit"></strong><div class="margin-row"><span>毛利率</span><strong class="margin" id="margin"></strong></div><p class="hint" id="profit-hint">輸入售價後顯示毛利與毛利率</p></div>
        <dl class="cost-list"><div class="cost-row"><dt>商品採購成本</dt><dd id="row-purchase"></dd></div><div class="cost-row"><dt>中國境內運費</dt><dd id="row-china"></dd></div><div class="cost-row"><dt>海運運費</dt><dd id="row-shipping"></dd></div><div class="cost-row"><dt>平台抽成</dt><dd id="row-platform"></dd></div><div class="cost-row"><dt>營業稅</dt><dd id="row-tax"></dd></div></dl>
      </aside>
    </div>
    <div class="actions"><button class="btn" id="save" type="button">儲存資料</button><button class="btn danger" id="reset" type="button">清除資料</button></div>
  </main>
  <footer class="footer">資料只會儲存在目前使用的瀏覽器</footer><div class="toast" id="toast" role="status"></div>
  <script>
    (function(){
      var key="product-cost-profit-v3",defaults={purchase:"20",rate:"4.55",chinaRate:"6",shipping:"0.036",weight:"500",sale:"0",platformRate:"14.5"};
      var fields={purchase:document.getElementById("purchase"),rate:document.getElementById("rate"),chinaRate:document.getElementById("china-rate"),shipping:document.getElementById("shipping"),weight:document.getElementById("weight"),sale:document.getElementById("sale"),platformRate:document.getElementById("platform-rate")};
      function n(v){var x=Number(v);return Number.isFinite(x)&&x>=0?x:0}function money(v,signed){v=Number.isFinite(v)?v:0;return(signed&&v<0?"-NT$ ":"NT$ ")+Math.abs(v).toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})}function set(id,value){document.getElementById(id).textContent=value}
      function calculate(){var purchase=n(fields.purchase.value),rate=n(fields.rate.value),chinaRate=Math.min(n(fields.chinaRate.value),100),shipRate=n(fields.shipping.value),weight=n(fields.weight.value),sale=n(fields.sale.value),platformRate=Math.min(n(fields.platformRate.value),100);var p=rate>0?purchase*rate:0,c=rate>0?purchase*chinaRate/100*rate:0,s=weight*shipRate,platform=sale*platformRate/100,tax=sale/1.05*.05,total=p+c+s+platform+tax,profit=sale>0?sale-total:0,margin=sale>0?profit/sale*100:0;set("purchase-result",money(p));set("china-rmb","境內運費人民幣 ¥ "+(purchase*chinaRate/100).toFixed(2));set("china-result",money(c));set("shipping-detail","每公克 NT$"+shipRate.toFixed(3)+"｜"+weight+"公克");set("shipping-result",money(s));set("sale-detail","平台 "+money(platform)+"｜營業稅 "+money(tax));set("sale-result",money(platform+tax));set("sale-summary",money(sale));set("total",money(total));set("profit",money(profit,true));set("margin",(Number.isFinite(margin)?margin:0).toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})+"%");set("row-purchase",money(p));set("row-china",money(c));set("row-shipping",money(s));set("row-platform",money(platform));set("row-tax",money(tax));var box=document.getElementById("profit-box");box.className="profit-box"+(sale>0?(profit>=0?" positive":" negative"):"");document.getElementById("profit-hint").style.display=sale>0?"none":"block";persist()}
      function persist(){try{var data={};Object.keys(fields).forEach(function(k){data[k]=fields[k].value});localStorage.setItem(key,JSON.stringify(data))}catch(e){}}
      function load(){var data={};try{data=JSON.parse(localStorage.getItem(key)||"{}")}catch(e){}Object.keys(fields).forEach(function(k){fields[k].value=data[k]!==undefined?data[k]:defaults[k]})}
      function toast(message){var el=document.getElementById("toast");el.textContent=message;el.classList.add("show");setTimeout(function(){el.classList.remove("show")},1800)}
      Object.keys(fields).forEach(function(k){fields[k].addEventListener("input",calculate);fields[k].addEventListener("change",calculate)});document.getElementById("save").addEventListener("click",function(){persist();toast("資料已儲存")});document.getElementById("reset").addEventListener("click",function(){if(!confirm("確定要清除目前輸入的資料嗎？"))return;Object.keys(fields).forEach(function(k){fields[k].value=defaults[k]});calculate();toast("資料已清除")});load();calculate();
    })();
  </script>
</body>
</html>
